<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <h1>Tableau de bord - Campus IT</h1>
    <div class="tab">
      <button class="tablinks" onclick="openTab(event, 'Top applications')">Top applications</button>
      <button class="tablinks" onclick="openTab(event, 'Tab2')">Evolution mensuelle</button>
      <button class="tablinks" onclick="openTab(event, 'Tab3')">Comparaison ressources</button>
    </div>

    <div id="Top applications" class="tabcontent">
      <h3>Top 5 des applications (consommation totale)</h3>
      <div id="top-apps-table"></div>
    </div>

    <div id="Tab2" class="tabcontent">
      <h3>Evolution mensuelle (total campus)</h3>
      <div id="monthly-evolution-table"></div>
    </div>

    <div id="Tab3" class="tabcontent">
      <h3>Comparaison stockage vs réseau</h3>
      <div id="resource-comparison-table"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
